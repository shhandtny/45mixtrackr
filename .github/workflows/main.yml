name: Deploy to Hostinger                                                                                        
                                                                                                                   
  "on":
    push:                                                                                                          
      branches: [main]                                                                                           
                                                                                                                   
  jobs:
    deploy:                                                                                                        
      runs-on: ubuntu-latest                                                                                     
      steps:                                                                                                     
        - uses: actions/checkout@v4

        - uses: actions/setup-node@v4
          with:
            node-version: '20'
            cache: 'npm'
                                                                                                                   
        - name: Install dependencies
          run: npm install                                                                                         
                                                                                                                 
        - name: Build                                                                                            
          run: npm run build

        - name: Deploy via SSH
          uses: appleboy/ssh-action@v1.0.3
          with:
            host: ${{ secrets.SSH_HOST }}
            port: ${{ secrets.SSH_PORT }}                                                                          
            username: ${{ secrets.SSH_USER }}
            key: ${{ secrets.SSH_PRIVATE_KEY }}                                                                    
            script: |                                                                                            
              export PATH="/opt/alt/alt-nodejs20/root/usr/bin:$PATH"                                             
              cd /home/u530278073/domains/45mixtrackr.com/nodejs                                                   
              git pull origin main
              npm install                                                                                          
              npm run build                                                                                      
              curl -L "https://github.com/eugeneware/ffmpeg-static/releases/download/b6.1.1/ffmpeg-linux-x64.gz" -o
   node_modules/ffmpeg-static/ffmpeg.gz                                                                            
              gunzip -f node_modules/ffmpeg-static/ffmpeg.gz
              chmod +x node_modules/ffmpeg-static/ffmpeg 
